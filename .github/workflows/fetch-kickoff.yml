name: Fetch Kickoff
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install twscrape
      - run: python scripts/fetch-kickoff.py
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/kickoffs.json
          git diff --cached --quiet || (git commit -m "auto: update kickoff" && git push && echo "changed=true" >> $GITHUB_OUTPUT)
      - name: Notify subscribers
        if: steps.commit.outputs.changed == 'true'
        run: |
          URL=$(jq -r '.nextKickoff.url' src/data/kickoffs.json)
          curl -X POST "${{ secrets.VERCEL_URL }}/api/notify" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"$URL\",\"title\":\"The Kickoff is live\",\"body\":\"Join the Space now\"}"
