name: Update Kickoffs

on:
  schedule:
    # 11:15 UTC  →  12:15 WAT (buffer after typical ~50m space)
    - cron: '15 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-kickoffs.mjs

      - name: Commit kickoffs.json if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: archive kickoff and advance date'
          file_pattern: src/data/kickoffs.json


