name: Update Media
on:
  schedule:
    - cron: '5 10 * * *'  # 10:05 UTC = 11:05 WAT
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/update-media.mjs
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
